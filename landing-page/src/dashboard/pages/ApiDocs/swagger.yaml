openapi: 3.0.0
info:
  title: FinTrack REST API
  description: Public API documentation for integrating external services with your FinTrack account.
  version: 1.0.0
servers:
  - url: https://api.yourdomain.com/v1
    description: Production Server (Coming Soon)
security:
  - bearerAuth: []
paths:
  /transactions:
    get:
      summary: Get all transactions
      description: Retrieve a paginated list of your financial transactions.
      parameters:
        - in: query
          name: type
          schema:
            type: string
          description: Filter by type (income or expense)
      responses:
        '200':
          description: A JSON array of transactions
    post:
      summary: Create a transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                amount:
                  type: number
                type:
                  type: string
                  enum: [income, expense]
                category:
                  type: string
                date:
                  type: string
                  format: date
      responses:
        '201':
          description: Transaction created
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
